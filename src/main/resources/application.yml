# Application - 공통 설정
spring:
  application:
    name: stock-market

  # 기본 프로파일
  profiles:
    active: dev

  # Static Resources - 새로고침 즉시 반영
  web:
    resources:
      cache:
        period: 0
      static-locations: file:src/main/resources/static/

  # JPA/Hibernate 공통 설정
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    properties:
      hibernate:
        naming:
          physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        jdbc:
          batch_size: 1000

  # Scheduler Configuration
  task:
    scheduling:
      pool:
        size: 5

server:
  port: 8080

# JWT Configuration (운영 환경에서는 환경 변수로 오버라이드)
jwt:
  secret: your-256-bit-secret-key-change-in-production-minimum-32-characters
  access-token-expiration: 1800000    # 30분 (밀리초)
  refresh-token-expiration: 604800000  # 7일 (밀리초)

# Kakao OAuth Configuration
kakao:
  oauth:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/oauth/kakao}
    token-uri: https://kauth.kakao.com/oauth/token
    issuer: https://kauth.kakao.com
    audience: ${KAKAO_CLIENT_ID}

# External APIs Base URLs
finnhub:
  api:
    url: https://finnhub.io/api/v1

kis:
  api:
    url: https://openapi.koreainvestment.com:9443
    key: ${KIS_APP_KEY}
    secret: ${KIS_APP_SECRET}
    account: ${KIS_ACCOUNT_NUMBER}
    master:
      base-url: https://new.real.download.dws.co.kr/common/master

news:
  rss:
    base-url: https://news.google.com/rss/search
  api:
    naver:
      base-url: https://openapi.naver.com/v1/search/news.json
      client-id: ${NAVER_CLIENT_ID}
      client-secret: ${NAVER_CLIENT_SECRET}
      display: 100
    gnews:
      base-url: https://gnews.io/api/v4/search
      api-key: ${GNEWS_API_KEY}
      lang: en
      max: 100
    newsapi:
      base-url: https://newsapi.org/v2/everything
      api-key: ${NEWSAPI_API_KEY}
      language: en
      page-size: 100

# Stock API (공공데이터포털 - KRX 상장종목정보)
stock:
  api:
    datagokr:
      base-url: https://apis.data.go.kr/1160100/service/GetKrxListedInfoService/getItemInfo
      service-key: ${DATAGOKR_SERVICE_KEY}
      num-of-rows: 100

# DART OpenAPI (전자공시시스템)
dart:
  api:
    base-url: https://opendart.fss.or.kr/api
    crtfc-key: ${DART_API_KEY}

# Scheduler Configuration
scheduler:
  stock:
    update:
      enabled: true
      cron: 0 */30 9-15 * * MON-FRI
  news:
    update:
      enabled: true
      cron: 0 0 */1 * * *

# Economics API
economics:
  api:
    korea:
      ecos:
        base-url: https://ecos.bok.or.kr/api/KeyStatisticList
        api-key: ${ECOS_API_KEY}
        start-count: 1
        end-count: 200
    global:
      fred:
        # 향후 FRED API 설정 위치
      tradingeconomics:
        base-url: https://ko.tradingeconomics.com
        timeout: 5000
        user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized