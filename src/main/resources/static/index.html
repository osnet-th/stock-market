<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stock Market Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="bg-gray-50 min-h-screen" x-data="dashboard()">

    <!-- ==================== HEADER ==================== -->
    <header class="bg-white shadow-sm border-b border-gray-200 fixed top-0 w-full z-50">
        <div class="flex items-center justify-between px-3 lg:px-6 h-14">
            <div class="flex items-center gap-3">
                <!-- 햄버거 메뉴 (모바일/태블릿) -->
                <button @click="toggleMobileDrawer()"
                    class="lg:hidden p-2 -ml-1 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition min-w-[44px] min-h-[44px] flex items-center justify-center"
                    aria-label="메뉴 열기">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h1 @click="navigateTo('home')" class="text-lg font-bold text-gray-800 cursor-pointer hover:text-blue-700 transition">Stock Market</h1>
                <span class="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded hidden sm:inline-block">Dashboard</span>
            </div>
            <div class="flex items-center gap-4">
                <template x-if="checkLoggedIn()">
                    <div class="flex items-center gap-3">
                        <span class="text-sm text-gray-600 hidden sm:inline">
                            <span x-text="auth.displayName || ('ID: ' + auth.userId)" class="font-medium"></span>
                        </span>
                        <button @click="logout()"
                            class="text-sm text-red-500 hover:text-red-700 font-medium">로그아웃</button>
                    </div>
                </template>
                <template x-if="!checkLoggedIn()">
                    <a href="/login.html" class="text-sm text-blue-600 hover:text-blue-800 font-medium">로그인</a>
                </template>
            </div>
        </div>
    </header>

    <div class="flex pt-14">
        <!-- ==================== MOBILE DRAWER BACKDROP ==================== -->
        <div x-show="mobileDrawerOpen && isMobile"
             x-transition:enter="transition-opacity ease-out duration-200"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition-opacity ease-in duration-150"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             @click="closeMobileDrawer()"
             class="fixed inset-0 z-40 bg-black/50 lg:hidden"
             x-cloak></div>

        <!-- ==================== SIDEBAR / DRAWER ==================== -->
        <!-- 모바일/태블릿: 오버레이 드로어 -->
        <aside x-show="mobileDrawerOpen"
               x-transition:enter="transition-transform ease-out duration-200"
               x-transition:enter-start="-translate-x-full"
               x-transition:enter-end="translate-x-0"
               x-transition:leave="transition-transform ease-in duration-150"
               x-transition:leave-start="translate-x-0"
               x-transition:leave-end="-translate-x-full"
               @keydown.escape.window="closeMobileDrawer()"
               class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-gray-200 shadow-xl overflow-y-auto overscroll-contain lg:hidden pt-14"
               x-cloak>
            <!-- ▼ NAV_ITEMS: 데스크탑 사이드바와 동기화 필요 ▼ -->
            <nav class="space-y-1 px-4 py-2">
                <template x-for="menu in menus" :key="menu.key">
                    <button
                        @click="navigateTo(menu.key)"
                        :class="currentPage === menu.key
                            ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-700'
                            : 'text-gray-600 hover:bg-gray-50'"
                        class="sidebar-item w-full text-left py-3 rounded-r text-sm font-medium flex items-center gap-3 transition-all min-h-[44px]">
                        <span class="flex-shrink-0 ml-3">
                            <template x-if="menu.icon === 'home'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4" /></svg>
                            </template>
                            <template x-if="menu.icon === 'tag'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5a1.99 1.99 0 011.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z" /></svg>
                            </template>
                            <template x-if="menu.icon === 'chart'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                            </template>
                            <template x-if="menu.icon === 'globe'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </template>
                            <template x-if="menu.icon === 'portfolio'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                            </template>
                        </span>
                        <span x-text="menu.label" class="whitespace-nowrap"></span>
                    </button>
                </template>
            </nav>
        </aside>

        <!-- 데스크탑: 고정 사이드바 -->
        <aside :class="sidebarCollapsed ? 'w-14' : 'w-56'"
               class="hidden lg:block bg-white border-r border-gray-200 min-h-[calc(100dvh-3.5rem)] fixed transition-all duration-300">
            <!-- 토글 버튼 -->
            <div class="flex justify-end p-2">
                <button @click="toggleSidebar()"
                    class="p-1.5 rounded-lg text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform duration-300"
                         :class="sidebarCollapsed ? 'rotate-180' : ''"
                         fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                    </svg>
                </button>
            </div>
            <!-- ▼ NAV_ITEMS: 모바일 드로어와 동기화 필요 ▼ -->
            <nav class="space-y-1" :class="sidebarCollapsed ? 'px-1' : 'px-4'">
                <template x-for="menu in menus" :key="menu.key">
                    <button
                        @click="navigateTo(menu.key)"
                        :class="currentPage === menu.key
                            ? 'bg-blue-50 text-blue-700 border-l-4 border-blue-700'
                            : 'text-gray-600 hover:bg-gray-50'"
                        class="sidebar-item w-full text-left py-2.5 rounded-r text-sm font-medium flex items-center gap-3 transition-all"
                        :title="sidebarCollapsed ? menu.label : ''">
                        <span class="flex-shrink-0" :class="sidebarCollapsed ? 'mx-auto' : 'ml-3'">
                            <template x-if="menu.icon === 'home'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4" /></svg>
                            </template>
                            <template x-if="menu.icon === 'tag'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5a1.99 1.99 0 011.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z" /></svg>
                            </template>
                            <template x-if="menu.icon === 'chart'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                            </template>
                            <template x-if="menu.icon === 'globe'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </template>
                            <template x-if="menu.icon === 'portfolio'">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                            </template>
                        </span>
                        <span x-show="!sidebarCollapsed" x-text="menu.label" class="whitespace-nowrap"></span>
                    </button>
                </template>
            </nav>
        </aside>

        <!-- ==================== MAIN CONTENT ==================== -->
        <main :class="isMobile ? '' : (sidebarCollapsed ? 'lg:ml-14' : 'lg:ml-56')"
              class="flex-1 p-3 sm:p-4 lg:p-6 min-h-[calc(100dvh-3.5rem)] transition-all duration-300">

            <!-- ========== HOME ========== -->
            <div x-show="currentPage === 'home'" x-cloak>
                <h2 class="text-xl font-bold text-gray-800 mb-6">대시보드</h2>

                <!-- 요약 카드 -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <!-- 키워드 요약 -->
                    <div @click="navigateTo('keywords')" class="summary-card bg-white rounded-xl border border-gray-200 p-5 cursor-pointer">
                        <p class="text-sm text-gray-500 mb-1">등록 키워드</p>
                        <p class="text-2xl font-bold text-gray-800" x-text="homeSummary.keywordCount"></p>
                        <p class="text-xs text-green-600 mt-1">
                            활성 <span x-text="homeSummary.activeKeywordCount" class="font-medium"></span>개
                        </p>
                        <p class="text-xs text-gray-400 mt-0.5">
                            국내 <span x-text="homeSummary.domesticKeywordCount" class="font-medium text-blue-600"></span>개
                            · 해외 <span x-text="homeSummary.internationalKeywordCount" class="font-medium text-purple-600"></span>개
                        </p>
                    </div>
                    <!-- ECOS 요약 -->
                    <div @click="navigateTo('ecos')" class="summary-card bg-white rounded-xl border border-gray-200 p-5 cursor-pointer">
                        <p class="text-sm text-gray-500 mb-1">국내 경제지표</p>
                        <p class="text-2xl font-bold text-gray-800" x-text="homeSummary.ecosCategories.length"></p>
                        <p class="text-xs text-gray-400 mt-1">카테고리</p>
                    </div>
                    <!-- 글로벌 요약 -->
                    <div @click="navigateTo('global')" class="summary-card bg-white rounded-xl border border-gray-200 p-5 cursor-pointer">
                        <p class="text-sm text-gray-500 mb-1">글로벌 경제지표</p>
                        <p class="text-2xl font-bold text-gray-800" x-text="homeSummary.globalCategories.length"></p>
                        <p class="text-xs text-gray-400 mt-1">카테고리</p>
                    </div>
                    <!-- 포트폴리오 요약 -->
                    <div @click="navigateTo('portfolio')" class="summary-card bg-white rounded-xl border border-gray-200 p-5 cursor-pointer">
                        <p class="text-sm text-gray-500 mb-1">포트폴리오</p>
                        <p class="text-2xl font-bold text-gray-800" x-text="homeSummary.portfolioItemCount || 0"></p>
                        <p class="text-xs text-gray-400 mt-1">
                            자산 항목 · <span x-text="homeSummary.portfolioTypeSummary || ''" class="font-medium text-blue-600"></span>
                            · 뉴스 <span x-text="homeSummary.portfolioNewsEnabledCount || 0" class="font-medium text-green-600"></span>개 활성
                        </p>
                    </div>
                </div>

                <!-- 국내 경제지표 카테고리 -->
            </div>

            <!-- ========== KEYWORDS ========== -->
            <div x-show="currentPage === 'keywords'" x-cloak>
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-xl font-bold text-gray-800">키워드</h2>
                    <button @click="keywords.showAddModal = true"
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                        + 키워드 등록
                    </button>
                </div>

                <!-- 로그인 필요 안내 -->
                <template x-if="!checkLoggedIn()">
                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 text-sm text-yellow-700">
                        키워드 관리를 사용하려면 로그인이 필요합니다.
                        <a href="/login.html" class="underline font-medium">로그인하기</a>
                    </div>
                </template>

                <template x-if="checkLoggedIn()">
                    <div>
                        <!-- 필터 -->
                        <div class="flex gap-2 mb-4 flex-wrap">
                            <template x-for="f in [{key:'all',label:'전체'},{key:'active',label:'활성'},{key:'inactive',label:'비활성'}]">
                                <button @click="keywords.filter = f.key; loadKeywords()"
                                    :class="keywords.filter === f.key ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                                    class="px-3 py-1.5 rounded-full text-xs font-medium transition" x-text="f.label">
                                </button>
                            </template>
                            <span class="border-l border-gray-300 mx-1"></span>
                            <template x-for="r in [{key:'all',label:'전체'},{key:'DOMESTIC',label:'국내'},{key:'INTERNATIONAL',label:'해외'}]">
                                <button @click="keywords.regionFilter = r.key"
                                    :class="keywords.regionFilter === r.key ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                                    class="px-3 py-1.5 rounded-full text-xs font-medium transition" x-text="r.label">
                                </button>
                            </template>
                        </div>

                        <!-- 키워드 목록 -->
                        <div class="space-y-2">
                            <template x-if="keywords.list.filter(k => keywords.regionFilter === 'all' || k.region === keywords.regionFilter).length === 0">
                                <div class="bg-white rounded-lg border border-gray-200 p-8 text-center text-gray-400 text-sm">
                                    등록된 키워드가 없습니다.
                                </div>
                            </template>
                            <template x-for="kw in keywords.list.filter(k => keywords.regionFilter === 'all' || k.region === keywords.regionFilter)" :key="kw.id">
                                <div @click="kw.active && selectNewsKeyword(kw)"
                                    :class="news.selectedKeywordId === kw.id ? 'border-blue-400 bg-blue-50' : 'border-gray-200 bg-white'"
                                    class="rounded-lg border p-4 flex items-center justify-between hover:shadow-sm transition"
                                    :style="kw.active ? 'cursor:pointer' : ''">
                                    <div class="flex items-center gap-3">
                                        <span class="font-medium text-gray-800" x-text="kw.keyword"></span>
                                        <span :class="kw.region === 'DOMESTIC' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'"
                                            class="text-xs px-2 py-0.5 rounded-full font-medium"
                                            x-text="kw.region === 'DOMESTIC' ? '국내' : '해외'">
                                        </span>
                                        <span :class="kw.active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'"
                                            class="text-xs px-2 py-0.5 rounded-full"
                                            x-text="kw.active ? '활성' : '비활성'">
                                        </span>
                                    </div>
                                    <div class="flex gap-2">
                                        <template x-if="kw.active">
                                            <button @click.stop="collectNews(kw)"
                                                :disabled="news.collectingKeywordId === kw.id"
                                                :class="news.collectingKeywordId === kw.id
                                                    ? 'text-gray-400 cursor-not-allowed'
                                                    : 'text-blue-600 hover:text-blue-800'"
                                                class="text-sm font-medium transition"
                                                x-text="news.collectingKeywordId === kw.id ? '수집 중...' : '수집'">
                                            </button>
                                        </template>
                                        <button @click="toggleKeyword(kw)"
                                            :class="kw.active ? 'text-yellow-600 hover:text-yellow-800' : 'text-green-600 hover:text-green-800'"
                                            class="text-sm font-medium transition"
                                            x-text="kw.active ? '비활성화' : '활성화'">
                                        </button>
                                        <button @click="removeKeyword(kw.id)"
                                            class="text-sm text-red-500 hover:text-red-700 font-medium transition">삭제</button>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <!-- 뉴스 영역 -->
                        <template x-if="news.selectedKeywordId">
                            <div class="mt-6">
                                <div class="border-t border-gray-200 pt-6">
                                    <!-- 로딩 -->
                                    <template x-if="news.loading">
                                        <div class="flex justify-center py-12">
                                            <div class="spinner"></div>
                                        </div>
                                    </template>

                                    <template x-if="!news.loading">
                                        <div>
                                            <!-- 결과 요약 -->
                                            <p class="text-sm text-gray-500 mb-4">
                                                '<span x-text="news.selectedKeywordText" class="font-medium text-gray-700"></span>'
                                                뉴스 <span x-text="news.totalElements" class="font-medium"></span>건
                                            </p>

                                            <!-- 뉴스 카드 -->
                                            <template x-if="news.list.length === 0">
                                                <div class="bg-white rounded-xl border border-gray-200 p-8 text-center text-gray-400 text-sm">
                                                    수집된 뉴스가 없습니다.
                                                </div>
                                            </template>

                                            <div class="space-y-3">
                                                <template x-for="article in news.list" :key="article.id">
                                                    <a :href="article.originalUrl" target="_blank" rel="noopener noreferrer"
                                                        @click.stop
                                                        class="block bg-white rounded-lg border border-gray-200 p-4 hover:shadow-md transition cursor-pointer">
                                                        <h3 class="text-sm font-semibold text-gray-800 mb-1 line-clamp-2" x-text="article.title"></h3>
                                                        <p class="text-xs text-gray-500 line-clamp-2 mb-2" x-text="article.content"></p>
                                                        <div class="flex items-center gap-3 text-xs text-gray-400">
                                                            <span x-text="article.publishedAt ? new Date(article.publishedAt).toLocaleDateString('ko-KR') : '-'"></span>
                                                            <span class="text-blue-500 hover:underline">원문 보기</span>
                                                        </div>
                                                    </a>
                                                </template>
                                            </div>

                                            <!-- 페이지 네비게이션 -->
                                            <template x-if="news.totalPages > 1">
                                                <div class="flex justify-center items-center gap-2 mt-6">
                                                    <button @click.stop="loadNews(news.page - 1)"
                                                        :disabled="news.page === 0"
                                                        :class="news.page === 0 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:text-blue-600'"
                                                        class="px-3 py-1.5 text-sm font-medium transition">
                                                        이전
                                                    </button>
                                                    <template x-for="p in news.totalPages" :key="p">
                                                        <button @click.stop="loadNews(p - 1)"
                                                            x-show="Math.abs((p - 1) - news.page) < 3 || p === 1 || p === news.totalPages"
                                                            :class="(p - 1) === news.page
                                                                ? 'bg-blue-600 text-white'
                                                                : 'text-gray-600 hover:bg-gray-100'"
                                                            class="w-8 h-8 rounded text-sm font-medium transition"
                                                            x-text="p">
                                                        </button>
                                                    </template>
                                                    <button @click.stop="loadNews(news.page + 1)"
                                                        :disabled="news.page >= news.totalPages - 1"
                                                        :class="news.page >= news.totalPages - 1 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:text-blue-600'"
                                                        class="px-3 py-1.5 text-sm font-medium transition">
                                                        다음
                                                    </button>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- 등록 모달 -->
                <div x-show="keywords.showAddModal" x-cloak

                                <span x-show="portfolio.purchaseItem?.stockDetail?.priceCurrency && portfolio.purchaseItem.stockDetail.priceCurrency !== 'KRW'"
                                      class="text-blue-500 font-medium"
                                      x-text="'(' + portfolio.purchaseItem.stockDetail.priceCurrency + ')'"></span>
                            </label>
                            <input type="number" x-model="portfolio.purchaseForm.purchasePrice"
                                :step="portfolio.purchaseItem?.stockDetail?.priceCurrency && portfolio.purchaseItem.stockDetail.priceCurrency !== 'KRW' ? '0.01' : '1'"
                                :placeholder="portfolio.purchaseItem?.stockDetail?.priceCurrency && portfolio.purchaseItem.stockDetail.priceCurrency !== 'KRW' ? '1주당 매수가 (외화)' : '1주당 매수가'"
                                min="0.01"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
                        </div>
                    </div>

                    <!-- 예상 결과 미리보기 -->
                    <template x-if="portfolio.purchaseForm.quantity > 0 && portfolio.purchaseForm.purchasePrice > 0 && portfolio.purchaseItem && portfolio.purchaseItem.stockDetail">
                        <div class="bg-emerald-50 rounded-lg p-3 mt-4 text-sm text-emerald-700 space-y-1">
                            <p class="font-medium text-emerald-800 mb-1">매수 후 예상</p>
                            <div class="flex justify-between">
                                <span>총 수량</span>
                                <span class="font-medium" x-text="Format.number(portfolio.purchaseItem.stockDetail.quantity + Number(portfolio.purchaseForm.quantity), 0) + '주'"></span>
                            </div>
                            <div class="flex justify-between">
                                <span>예상 평균 매수가</span>
                                <span class="font-medium" x-text="Format.number(Math.round((portfolio.purchaseItem.stockDetail.quantity * portfolio.purchaseItem.stockDetail.avgBuyPrice + Number(portfolio.purchaseForm.quantity) * Number(portfolio.purchaseForm.purchasePrice)) / (portfolio.purchaseItem.stockDetail.quantity + Number(portfolio.purchaseForm.quantity))), 0) + '원'"></span>
                            </div>
                            <div class="flex justify-between">
                                <span>예상 투자 금액</span>
                                <span class="font-medium" x-text="Format.number(Math.round((portfolio.purchaseItem.stockDetail.quantity + Number(portfolio.purchaseForm.quantity)) * Math.round((portfolio.purchaseItem.stockDetail.quantity * portfolio.purchaseItem.stockDetail.avgBuyPrice + Number(portfolio.purchaseForm.quantity) * Number(portfolio.purchaseForm.purchasePrice)) / (portfolio.purchaseItem.stockDetail.quantity + Number(portfolio.purchaseForm.quantity)))), 0) + '원'"></span>
                            </div>
                        </div>
                    </template>

                    <!-- 매수 이력 목록 -->
                    <template x-if="portfolio.purchaseHistories.length > 0">
                        <div class="mt-4">
                            <h4 class="text-sm font-semibold text-gray-700 mb-2">매수 이력</h4>
                            <div class="space-y-2 max-h-48 overflow-y-auto">
                                <template x-for="h in portfolio.purchaseHistories" :key="h.id">
                                    <div class="bg-gray-50 rounded-lg p-3 text-sm">
                                        <!-- 보기 모드 -->
                                        <template x-if="portfolio.editingHistory !== h.id">
                                            <div>
                                                <div class="flex justify-between items-center">
                                                    <div>
                                                        <span class="font-medium text-gray-800"
                                                            x-text="Format.number(h.quantity, 0) + '주'"></span>
                                                        <span class="text-gray-500 mx-1">&times;</span>
                                                        <span class="text-gray-800"
                                                            x-text="Format.number(h.purchasePrice, 0) + '원'"></span>
                                                        <span class="text-gray-400 ml-2"
                                                            x-text="'= ' + Format.number(h.totalCost, 0) + '원'"></span>
                                                    </div>
                                                    <div class="flex gap-2">
                                                        <button @click.stop="startEditHistory(h)"
                                                            class="text-xs text-blue-600 hover:text-blue-800">수정</button>
                                                        <button x-show="portfolio.purchaseHistories.length > 1"
                                                            @click.stop="deleteHistory(h.id)"
                                                            class="text-xs text-red-500 hover:text-red-700">삭제</button>
                                                    </div>
                                                </div>
                                                <div class="flex gap-3 mt-1 text-xs text-gray-400">
                                                    <span x-show="h.purchasedAt" x-text="h.purchasedAt"></span>
                                                    <span x-show="h.memo" x-text="h.memo"></span>
                                                </div>
                                            </div>
                                        </template>
                                        <!-- 수정 모드 -->
                                        <template x-if="portfolio.editingHistory === h.id">
                                            <div class="space-y-2">
                                                <div class="flex gap-2">
                                                    <input type="number" x-model="portfolio.editHistoryForm.quantity"
                                                        placeholder="수량" min="1"
                                                        class="w-1/3 border border-gray-300 rounded px-2 py-1 text-sm">
                                                    <input type="number" x-model="portfolio.editHistoryForm.purchasePrice"
                                                        placeholder="단가" min="1"
                                                        class="w-2/3 border border-gray-300 rounded px-2 py-1 text-sm">
                                                </div>
                                                <div class="flex gap-2">
                                                    <input type="date" x-model="portfolio.editHistoryForm.purchasedAt"
                                                        class="w-1/2 border border-gray-300 rounded px-2 py-1 text-sm">
                                                    <input type="text" x-model="portfolio.editHistoryForm.memo"
                                                        placeholder="메모" maxlength="200"
                                                        class="w-1/2 border border-gray-300 rounded px-2 py-1 text-sm">
                                                </div>
                                                <div class="flex justify-end gap-2">
                                                    <button @click.stop="cancelEditHistory()"
                                                        class="text-xs text-gray-500 hover:text-gray-700">취소</button>
                                                    <button @click.stop="submitEditHistory(h.id)"
                                                        class="text-xs text-blue-600 hover:text-blue-800 font-medium">저장</button>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- 버튼 -->
                    <div class="flex justify-end gap-2 mt-6">
                        <button @click="portfolio.showPurchaseModal = false"
                            class="px-4 py-2 text-sm text-gray-600 hover:text-gray-800 transition">취소</button>
                        <button @click="submitPurchase()"
                            class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-emerald-700 transition">추가 매수</button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- ==================== 재무 상세 슬라이드 패널 ==================== -->
    <!-- 오버레이 -->
    <div x-show="portfolio.selectedStockItem"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-black bg-opacity-30 z-40"
         @click="closeStockDetail()">
    </div>

    <!-- 슬라이드 패널 본체 -->
    <div x-show="portfolio.selectedStockItem"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         @keydown.escape.window="closeStockDetail()"
         class="fixed top-0 right-0 h-full w-full lg:w-[65%] bg-white shadow-2xl z-50 overflow-y-auto"
         @click.stop>

        <!-- 패널 헤더 (sticky) -->
        <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 z-10">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800">
                    <span x-text="portfolio.selectedStockItem?.itemName"></span>
                    <span class="text-sm text-gray-500 ml-1"
                          x-text="'(' + (portfolio.selectedStockItem?.stockDetail?.stockCode || '') + ')'"></span>
                </h3>
                <button @click="closeStockDetail()"
                        class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
            </div>
            <!-- 보유 정보 -->
            <div class="flex gap-4 text-sm text-gray-600 mt-2">
                <span>수량: <span class="font-semibold" x-text="Format.number(portfolio.selectedStockItem?.stockDetail?.quantity)"></span>주</span>
                <span>평단가: <span class="font-semibold" x-text="'&#8361;' + Format.number(portfolio.selectedStockItem?.stockDetail?.avgBuyPrice)"></span></span>
                <span>투자금: <span class="font-semibold" x-text="'&#8361;' + Format.number(portfolio.selectedStockItem?.investedAmount)"></span></span>
            </div>
        </div>

        <!-- 패널 콘텐츠 -->
        <div class="px-6 py-4">
            <!-- 메뉴 버튼 목록 -->
            <div class="flex flex-wrap gap-2 mb-4">
                <template x-for="menu in portfolio.financialMenus" :key="menu.key">
                    <button @click="selectFinancialMenu(menu.key)"
                            class="text-xs px-3 py-1.5 rounded-full border transition"
                            :class="portfolio.selectedFinancialMenu === menu.key
                                ? 'bg-indigo-600 text-white border-indigo-600'
                                : 'bg-white text-gray-600 border-gray-300 hover:border-indigo-400 hover:text-indigo-600'"
                            x-text="menu.label">
                    </button>
                </template>
            </div>

            <!-- 메뉴 선택 시: 파라미터 + 결과 -->
            <template x-if="portfolio.selectedFinancialMenu">
                <div>
                    <!-- 파라미터 드롭다운 -->
                    <div class="flex flex-wrap gap-3 mb-4">
                        <!-- 연도 -->
                        <div class="flex items-center gap-2">
                            <label class="text-xs text-gray-500">연도</label>
                            <select x-model="portfolio.financialYear"
                                    @change="onFinancialFilterChange()"
                                    class="text-sm border border-gray-300 rounded px-2 py-1">
                                <template x-for="year in getYearOptions()" :key="year">
                                    <option :value="year" x-text="year + '년'"></option>
                                </template>
                            </select>
                        </div>
                        <!-- 보고서 (소송 제외) -->
                        <div class="flex items-center gap-2"
                             x-show="portfolio.selectedFinancialMenu !== 'lawsuits' && portfolio.financialOptions">
                            <label class="text-xs text-gray-500">보고서</label>
                            <select x-model="portfolio.financialReportCode"
                                    @change="onFinancialFilterChange()"
                                    class="text-sm border border-gray-300 rounded px-2 py-1">
                                <template x-for="opt in portfolio.financialOptions?.reportCodes" :key="opt.code">
                                    <option :value="opt.code" x-text="opt.label"></option>
                                </template>
                            </select>
                        </div>
                        <!-- 지표분류 (재무지표만) -->
                        <div class="flex items-center gap-2"
                             x-show="portfolio.selectedFinancialMenu === 'indices' && portfolio.financialOptions">
                            <label class="text-xs text-gray-500">지표분류</label>
                            <select x-model="portfolio.financialIndexClass"
                                    @change="onFinancialFilterChange()"
                                    class="text-sm border border-gray-300 rounded px-2 py-1">
                                <template x-for="opt in portfolio.financialOptions?.indexClassCodes" :key="opt.code">
                                    <option :value="opt.code" x-text="opt.label"></option>
                                </template>
                            </select>
                        </div>
                        <!-- 재무제표구분 (전체재무제표만) -->
                        <div class="flex items-center gap-2"
                             x-show="portfolio.selectedFinancialMenu === 'full-statements'">
                            <label class="text-xs text-gray-500">구분</label>
                            <select x-model="portfolio.financialFsDiv"
                                    @change="onFinancialFilterChange()"
                                    class="text-sm border border-gray-300 rounded px-2 py-1">
                                <option value="CFS">연결</option>
                                <option value="OFS">개별</option>
                            </select>
                        </div>
                        <!-- 로딩 스피너 -->
                        <div x-show="portfolio.financialLoading"
                             class="flex items-center text-xs text-gray-400">
                            <svg class="animate-spin h-4 w-4 mr-1" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            조회 중...
                        </div>
                    </div>

                    <!-- 결과 영역 -->
                    <template x-if="portfolio.financialResult !== null && !portfolio.financialLoading">
                        <div>
                            <!-- 빈 결과 -->
                            <template x-if="portfolio.financialResult.length === 0">
                                <div class="text-center py-6 text-gray-400 text-sm">
                                    해당 연도/보고서의 데이터가 아직 등록되지 않았습니다.
                                    <br><span class="text-xs">다른 연도나 보고서를 선택해 주세요.</span>
                                </div>
                            </template>

                            <!-- 재무제표 필터 (재무계정 탭) -->
                            <template x-if="portfolio.financialResult.length > 0 && portfolio.selectedFinancialMenu === 'accounts' && getFilterOptions('fsName').length > 0">
                                <div class="flex items-center gap-3 mb-4">
                                    <span class="text-xs text-gray-500">제표구분</span>
                                    <label class="flex items-center gap-1 cursor-pointer">
                                        <input type="radio" name="accountFsFilter" value=""
                                               x-model="portfolio.financialAccountFsFilter"
                                               @change="$nextTick(() => renderFinancialBarChart())"
                                               class="w-3 h-3 text-indigo-600">
                                        <span class="text-xs text-gray-600">전체</span>
                                    </label>
                                    <template x-for="opt in getFilterOptions('fsName')" :key="opt">
                                        <label class="flex items-center gap-1 cursor-pointer">
                                            <input type="radio" name="accountFsFilter" :value="opt"
                                                   x-model="portfolio.financialAccountFsFilter"
                                                   @change="$nextTick(() => renderFinancialBarChart())"
                                                   class="w-3 h-3 text-indigo-600">
                                            <span class="text-xs text-gray-600" x-text="opt"></span>
                                        </label>
                                    </template>
                                </div>
                            </template>

                            <!-- 제표종류 필터 (전체재무제표 탭) -->
                            <template x-if="portfolio.financialResult.length > 0 && portfolio.selectedFinancialMenu === 'full-statements' && getFilterOptions('statementName').length > 0">
                                <div class="flex items-center gap-3 mb-4 flex-wrap">
                                    <span class="text-xs text-gray-500">제표종류</span>
                                    <label class="flex items-center gap-1 cursor-pointer">
                                        <input type="radio" name="statementFilter" value=""
                                               x-model="portfolio.financialStatementFilter"
                                               class="w-3 h-3 text-indigo-600">
                                        <span class="text-xs text-gray-600">전체</span>
                                    </label>
                                    <template x-for="opt in getFilterOptions('statementName')" :key="opt">
                                        <label class="flex items-center gap-1 cursor-pointer">
                                            <input type="radio" name="statementFilter" :value="opt"
                                                   x-model="portfolio.financialStatementFilter"
                                                   class="w-3 h-3 text-indigo-600">
                                            <span class="text-xs text-gray-600" x-text="opt"></span>
                                        </label>
                                    </template>
                                </div>
                            </template>

                            <!-- 바 차트 (재무계정 탭) -->
                            <template x-if="portfolio.financialResult.length > 0 && portfolio.selectedFinancialMenu === 'accounts'">
                                <div class="mb-4 bg-white rounded-lg border border-gray-200 p-4">
                                    <h4 class="text-xs font-semibold text-gray-500 mb-3">주요 재무 추세 (당기 / 전기 / 전전기)</h4>
                                    <div style="height: 250px;">
                                        <canvas id="financialBarChart"></canvas>
                                    </div>
                                </div>
                            </template>

                            <!-- 요약 카드 -->
                            <template x-if="portfolio.financialResult.length > 0 && getFinancialSummaryCards().length > 0">
                                <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
                                    <template x-for="card in getFinancialSummaryCards()" :key="card.label">
                                        <div class="bg-white rounded-lg border border-gray-200 p-3">
                                            <p class="text-xs text-gray-500 mb-1" x-text="card.label"></p>
                                            <p class="text-sm font-bold text-gray-800" x-text="card.value"></p>
                                            <template x-if="card.changeRate !== null">
                                                <p class="text-xs mt-0.5"
                                                   :class="card.changeRate > 0 ? 'text-red-500' : card.changeRate < 0 ? 'text-blue-500' : 'text-gray-400'"
                                                   x-text="(card.changeRate >= 0 ? '▲ +' : '▼ ') + card.changeRate.toFixed(1) + '%'"></p>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- 결과 테이블 -->
                            <template x-if="portfolio.financialResult.length > 0">
                                <div class="overflow-x-auto overflow-y-auto" style="max-height: calc(100dvh - 450px);">
                                    <table class="w-full text-sm">
                                        <thead class="sticky top-0 bg-white z-10">
                                            <tr class="border-b border-gray-200">
                                                <template x-if="getFinancialColumns()">
                                                    <template x-for="col in getFinancialColumns()" :key="col.key">
                                                        <th class="py-2 px-2 text-xs text-gray-500 font-medium whitespace-nowrap"
                                                            :class="isAmountColumn(col.type) ? 'text-right' : 'text-left'"
                                                            x-text="col.label"></th>
                                                    </template>
                                                </template>
                                                <template x-if="!getFinancialColumns()">
                                                    <template x-for="key in Object.keys(portfolio.financialResult[0])" :key="key">
                                                        <th class="text-left py-2 px-2 text-xs text-gray-500 font-medium" x-text="key"></th>
                                                    </template>
                                                </template>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template x-for="(row, idx) in getFilteredFinancialResult()" :key="idx">
                                                <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                                                    <template x-if="getFinancialColumns()">
                                                        <template x-for="col in getFinancialColumns()" :key="col.key">
                                                            <td class="py-2 px-2"
                                                                :class="isAmountColumn(col.type) ? 'text-right font-mono text-gray-700' : 'text-gray-700'">
                                                                <template x-if="!col.tooltip">
                                                                    <span x-text="formatFinancialCell(row[col.key], col.type)"></span>
                                                                </template>
                                                                <template x-if="col.tooltip">
                                                                    <span class="inline-flex items-center gap-1">
                                                                        <span x-text="formatFinancialCell(row[col.key], col.type)"></span>
                                                                        <template x-if="getFinancialDescription(portfolio.selectedFinancialMenu, row[col.key])">
                                                                            <div class="group/ftip relative inline-block">
                                                                                <span class="text-gray-300 hover:text-gray-500 cursor-help text-xs">&#9432;</span>
                                                                                <div class="invisible opacity-0 group-hover/ftip:visible group-hover/ftip:opacity-100
                                                                                            absolute z-10 bottom-full left-0 mb-2
                                                                                            px-3 py-2 text-xs text-white bg-gray-800 rounded-lg shadow-lg
                                                                                            w-72 max-w-xs transition-opacity duration-200"
                                                                                     role="tooltip">
                                                                                    <span x-text="getFinancialDescription(portfolio.selectedFinancialMenu, row[col.key])"></span>
                                                                                </div>
                                                                            </div>
                                                                        </template>
                                                                    </span>
                                                                </template>
                                                            </td>
                                                        </template>
                                                    </template>
                                                    <template x-if="!getFinancialColumns()">
                                                        <template x-for="key in Object.keys(row)" :key="key">
                                                            <td class="py-2 px-2 text-gray-700" x-text="row[key]"></td>
                                                        </template>
                                                    </template>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <!-- 메뉴 미선택 시 안내 -->
            <template x-if="!portfolio.selectedFinancialMenu">
                <div class="text-center py-6 text-gray-400 text-sm">
                    위 메뉴를 선택하여 재무정보를 조회하세요
                </div>
            </template>
        </div>
    </div>

    <!-- ==================== 챗봇 버블 + 패널 ==================== -->
    <!-- 챗봇 버블 버튼 -->
    <button @click="toggleChat()"
            x-show="currentPage === 'portfolio'"
            x-cloak
            class="fixed bottom-6 right-6 w-14 h-14 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full shadow-lg flex items-center justify-center z-40 transition-all duration-200">
        <svg x-show="!chat.isOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <svg x-show="chat.isOpen" x-cloak class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>

    <!-- 챗 패널 -->
    <div x-show="chat.isOpen && currentPage === 'portfolio'"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-4"
         x-cloak
         :style="!isMobile && (chat.dragging || chat.dragPos.x !== null)
             ? `left:${chat.dragPos.x}px; top:${chat.dragPos.y}px; right:auto; bottom:auto;`
             : ''"
         :class="chatPanelClasses()">

        <!-- 헤더 (데스크탑: 드래그 가능) -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100 select-none"
             :class="isMobile ? '' : 'cursor-move'"
             @mousedown="!isMobile && startChatDrag($event)">
            <span class="font-semibold text-gray-800 text-sm">물어보슈</span>
            <div class="flex items-center gap-1">
                <button @click="chat.expanded = !chat.expanded"
                    x-show="!isMobile"
                    class="text-gray-400 hover:text-gray-600 p-1">
                    <svg x-show="!chat.expanded" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
                    </svg>
                    <svg x-show="chat.expanded" x-cloak class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9V4.5M9 9H4.5M9 9L3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5l5.25 5.25"/>
                    </svg>
                </button>
                <button @click="toggleChat()" class="text-gray-400 hover:text-gray-600 p-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 모드 토글 -->
        <div class="flex gap-2 px-4 py-2 border-b border-gray-100">
            <button @click="setChatMode('PORTFOLIO')"
                    :class="chat.chatMode === 'PORTFOLIO'
                        ? 'bg-indigo-600 text-white'
                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                    class="flex-1 text-xs font-medium py-1.5 rounded-lg transition-colors">
                포트폴리오 분석
            </button>
            <button @click="setChatMode('FINANCIAL')"
                    :class="chat.chatMode === 'FINANCIAL'
                        ? 'bg-indigo-600 text-white'
                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                    class="flex-1 text-xs font-medium py-1.5 rounded-lg transition-colors">
                재무 분석
            </button>
        </div>

        <!-- 종목 선택 (FINANCIAL 모드만) -->
        <div x-show="chat.chatMode === 'FINANCIAL'" x-cloak class="px-4 py-2 border-b border-gray-100">
            <template x-if="!chat.stockCode">
                <div class="relative">
                    <input type="text"
                           x-model="chat.stockSearchQuery"
                           @input.debounce.300ms="searchChatStocks()"
                           placeholder="종목명 검색..."
                           class="w-full text-xs border border-gray-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <div x-show="chat.stockSearchResults.length > 0"
                         @click.outside="chat.stockSearchResults = []"
                         class="absolute top-full left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-40 overflow-y-auto z-10">
                        <template x-for="stock in chat.stockSearchResults" :key="stock.stockCode">
                            <button @click="selectChatStock(stock)"
                                    class="w-full text-left px-3 py-2 text-xs hover:bg-gray-50 border-b border-gray-50 last:border-0">
                                <span x-text="stock.stockName" class="font-medium"></span>
                                <span x-text="stock.stockCode" class="text-gray-400 ml-1"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </template>
            <template x-if="chat.stockCode">
                <div class="flex items-center justify-between bg-indigo-50 rounded-lg px-3 py-1.5">
                    <span class="text-xs font-medium text-indigo-700" x-text="chat.stockName + ' (' + chat.stockCode + ')'"></span>
                    <button @click="clearChatStock()" class="text-indigo-400 hover:text-indigo-600">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </template>
        </div>

        <!-- 메시지 영역 -->
        <div id="chatMessages" class="flex-1 overflow-y-auto px-4 py-3 space-y-3">
            <template x-if="chat.messages.length === 0">
                <div class="flex flex-col items-center justify-center h-full text-gray-400">
                    <svg class="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                    <p class="text-xs" x-text="chat.chatMode === 'PORTFOLIO' ? '포트폴리오에 대해 질문해보세요' : '종목을 선택하고 재무 분석을 요청하세요'"></p>
                </div>
            </template>
            <template x-for="(msg, idx) in chat.messages" :key="idx">
                <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                    <template x-if="msg.role === 'user'">
                        <div class="bg-indigo-600 text-white rounded-xl rounded-tr-sm max-w-[85%] px-3 py-2 text-xs leading-relaxed whitespace-pre-wrap"
                             x-text="msg.content">
                        </div>
                    </template>
                    <template x-if="msg.role === 'assistant'">
                        <div class="bg-gray-100 text-gray-800 rounded-xl rounded-tl-sm max-w-[85%] px-3 py-2 text-xs leading-relaxed chat-markdown"
                             x-html="renderMarkdown(msg.content)">
                        </div>
                    </template>
                </div>
            </template>
            <div x-show="chat.isLoading && chat.messages.length > 0 && chat.messages[chat.messages.length-1].content === ''"
                 class="flex justify-start">
                <div class="bg-gray-100 rounded-xl rounded-tl-sm px-3 py-2">
                    <div class="flex gap-1">
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 입력 영역 -->
        <div class="px-4 py-3 border-t border-gray-100">
            <div class="flex gap-2">
                <input type="text"
                       x-model="chat.inputText"
                       @keydown.enter="sendChatMessage()"
                       :disabled="chat.isLoading"
                       :placeholder="chat.chatMode === 'FINANCIAL' && !chat.stockCode ? '먼저 종목을 선택해주세요' : '메시지를 입력하세요...'"
                       class="flex-1 text-xs border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-indigo-500 disabled:bg-gray-50 disabled:text-gray-400">
                <button @click="sendChatMessage()"
                        :disabled="chat.isLoading || !chat.inputText.trim() || (chat.chatMode === 'FINANCIAL' && !chat.stockCode)"
                        class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 text-white rounded-lg px-3 py-2 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts (순서 중요: api > utils > marked > components > app > Alpine) -->
    <script src="/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/utils/format.js"></script>

    <!-- 컴포넌트 (순서 무관 - 객체 리터럴 선언만) -->
    <script src="/js/components/auth.js"></script>
    <script src="/js/components/home.js"></script>
    <script src="/js/components/keyword.js"></script>
    <script src="/js/components/news.js"></script>
    <script src="/js/components/ecos.js"></script>
    <script src="/js/components/global.js"></script>
    <script src="/js/components/portfolio.js"></script>
    <script src="/js/components/financial.js"></script>
    <script src="/js/components/chat.js"></script>

    <!-- 메인 앱 (컴포넌트 통합) -->
    <script src="/js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</body>
</html>
